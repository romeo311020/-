<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم مباريات كرة القدم</title>
    <!-- CSS -->
    <style>
        :root {
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --primary: #4CAF50;
            --secondary: #2196F3;
            --danger: #f44336;
            --text-white: #ffffff;
            --text-gray: #b0b0b0;
            --border-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            line-height: 1.6;
            direction: rtl;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }

        .online { background-color: var(--primary); }
        .offline { background-color: var(--danger); }

        h2 { margin-bottom: 20px; color: var(--primary); }

        .form-group {
            margin-bottom: 15px;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: var(--text-gray);
        }

        input {
            width: 100%;
            padding: 12px;
            background-color: #2a2a2a;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-white);
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background-color: var(--primary); color: white; width: 100%; }
        .btn-primary:hover { opacity: 0.8; }

        .btn-secondary { background-color: #444; color: white; }
        .btn-danger { background-color: var(--danger); color: white; padding: 8px 12px; }
        .btn-edit { background-color: var(--secondary); color: white; padding: 8px 12px; }

        .matches-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .match-item {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .match-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .team-logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        .match-details {
            text-align: right;
        }

        .match-actions {
            display: flex;
            gap: 10px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            width: 90%;
            max-width: 500px;
        }

        @media (max-width: 600px) {
            .form-row {
                flex-direction: column;
                gap: 10px;
            }
            .match-item {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .match-info {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>لوحة تحكم المباريات</h1>
            <div id="status-badge" class="badge offline">جاري التحقق...</div>
        </header>

        <section id="add-match-section" class="card">
            <h2>إضافة مباراة جديدة</h2>
            <form id="match-form">
                <div class="form-group">
                    <label>التاريخ:</label>
                    <input type="date" id="match-date" required>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>الفريق المضيف (Home):</label>
                        <input type="text" id="home-team" placeholder="اسم الفريق" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>رابط شعار المضيف:</label>
                        <input type="url" id="home-logo" placeholder="https://example.com/logo.png" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group" style="flex: 1;">
                        <label>الفريق الضيف (Away):</label>
                        <input type="text" id="away-team" placeholder="اسم الفريق" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>رابط شعار الضيف:</label>
                        <input type="url" id="away-logo" placeholder="https://example.com/logo.png" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>وقت المباراة:</label>
                    <input type="time" id="match-time" required>
                </div>
                <button type="submit" id="save-btn" class="btn-primary">حفظ المباراة</button>
            </form>
        </section>

        <section id="matches-list-section" class="card">
            <h2>قائمة المباريات</h2>
            <div id="matches-container" class="matches-grid">
                <p class="loading">جاري تحميل المباريات...</p>
            </div>
        </section>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content card">
            <h3>تعديل المباراة</h3>
            <form id="edit-form">
                <div class="form-group">
                    <label>التاريخ:</label>
                    <input type="date" id="edit-date" required>
                </div>
                <div class="form-row">
                    <input type="text" id="edit-home" placeholder="الفريق المضيف" required>
                    <input type="url" id="edit-home-logo" placeholder="رابط الشعار" required>
                </div>
                <div class="form-row">
                    <input type="text" id="edit-away" placeholder="الفريق الضيف" required>
                    <input type="url" id="edit-away-logo" placeholder="رابط الشعار" required>
                </div>
                <div class="form-group">
                    <label>الوقت:</label>
                    <input type="time" id="edit-time" required>
                </div>
                <div class="modal-actions" style="display: flex; gap: 10px;">
                    <button type="submit" class="btn-primary">حفظ التعديلات</button>
                    <button type="button" onclick="closeModal()" class="btn-secondary">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ملاحظة للمستخدم: ضع بيانات Firebase هنا
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        let database;
        let isOnline = false;

        // تهيئة Firebase
        try {
            if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
                firebase.initializeApp(firebaseConfig);
                database = firebase.database();
                isOnline = true;
            } else {
                console.warn("Firebase config not set, using local mode.");
                isOnline = false;
            }
        } catch (error) {
            isOnline = false;
        }

        const matchForm = document.getElementById('match-form');
        const matchesContainer = document.getElementById('matches-container');
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');
        const statusBadge = document.getElementById('status-badge');

        function updateStatusBadge(online) {
            statusBadge.textContent = online ? "متصل بـ Firebase" : "وضع محلي (LocalStorage)";
            statusBadge.className = `badge ${online ? 'online' : 'offline'}`;
        }

        window.onload = () => {
            updateStatusBadge(isOnline);
            loadMatches();
            if (isOnline) {
                database.ref('.info/connected').on('value', (snap) => {
                    updateStatusBadge(snap.val() === true);
                });
            }
        };

        function loadMatches() {
            if (isOnline) {
                database.ref('matches').on('value', (snapshot) => {
                    const data = snapshot.val();
                    const matches = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                    renderMatches(matches);
                    localStorage.setItem('local_matches', JSON.stringify(matches));
                });
            } else {
                const localData = JSON.parse(localStorage.getItem('local_matches')) || [];
                renderMatches(localData);
            }
        }

        function renderMatches(matches) {
            if (matches.length === 0) {
                matchesContainer.innerHTML = '<p style="text-align:center; padding:20px; color:var(--text-gray);">لا توجد مباريات حالياً.</p>';
                return;
            }

            matchesContainer.innerHTML = matches.map(match => `
                <div class="match-item">
                    <div class="match-info">
                        <div class="logos" style="display:flex; gap:5px; align-items:center;">
                            <img src="${match.homeLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/40'">
                            <span style="color:var(--primary); font-weight:bold;">VS</span>
                            <img src="${match.awayLogo}" class="team-logo" onerror="this.src='https://via.placeholder.com/40'">
                        </div>
                        <div class="match-details">
                            <strong>${match.home} × ${match.away}</strong>
                            <div style="font-size:0.8rem; color:var(--text-gray);">${match.date} | ${match.time}</div>
                        </div>
                    </div>
                    <div class="match-actions">
                        <button onclick="openEditModal('${match.id}')" class="btn-edit">تعديل</button>
                        <button onclick="deleteMatch('${match.id}')" class="btn-danger">حذف</button>
                    </div>
                </div>
            `).join('');
        }

        matchForm.onsubmit = (e) => {
            e.preventDefault();
            const newMatch = {
                date: document.getElementById('match-date').value,
                home: document.getElementById('home-team').value,
                homeLogo: document.getElementById('home-logo').value,
                away: document.getElementById('away-team').value,
                awayLogo: document.getElementById('away-logo').value,
                time: document.getElementById('match-time').value
            };

            if (isOnline) {
                database.ref('matches').push(newMatch).then(() => {
                    alert("تمت الإضافة بنجاح");
                    matchForm.reset();
                });
            } else {
                const localData = JSON.parse(localStorage.getItem('local_matches')) || [];
                newMatch.id = "local_" + Date.now();
                localData.push(newMatch);
                localStorage.setItem('local_matches', JSON.stringify(localData));
                renderMatches(localData);
                alert("تم الحفظ محلياً");
                matchForm.reset();
            }
        };

        function deleteMatch(id) {
            if (!confirm("هل أنت متأكد؟")) return;
            if (isOnline && !id.startsWith("local_")) {
                database.ref('matches/' + id).remove();
            } else {
                let localData = JSON.parse(localStorage.getItem('local_matches')) || [];
                localData = localData.filter(m => m.id !== id);
                localStorage.setItem('local_matches', JSON.stringify(localData));
                renderMatches(localData);
            }
        }

        let currentEditId = null;
        function openEditModal(id) {
            currentEditId = id;
            let match;
            if (isOnline && !id.startsWith("local_")) {
                database.ref('matches/' + id).once('value').then(snap => {
                    match = snap.val();
                    fillEdit(match);
                });
            } else {
                const localData = JSON.parse(localStorage.getItem('local_matches')) || [];
                match = localData.find(m => m.id === id);
                fillEdit(match);
            }
        }

        function fillEdit(match) {
            document.getElementById('edit-date').value = match.date;
            document.getElementById('edit-home').value = match.home;
            document.getElementById('edit-home-logo').value = match.homeLogo;
            document.getElementById('edit-away').value = match.away;
            document.getElementById('edit-away-logo').value = match.awayLogo;
            document.getElementById('edit-time').value = match.time;
            editModal.style.display = 'flex';
        }

        editForm.onsubmit = (e) => {
            e.preventDefault();
            const updated = {
                date: document.getElementById('edit-date').value,
                home: document.getElementById('edit-home').value,
                homeLogo: document.getElementById('edit-home-logo').value,
                away: document.getElementById('edit-away').value,
                awayLogo: document.getElementById('edit-away-logo').value,
                time: document.getElementById('edit-time').value
            };

            if (isOnline && !currentEditId.startsWith("local_")) {
                database.ref('matches/' + currentEditId).update(updated).then(() => {
                    closeModal();
                });
            } else {
                let localData = JSON.parse(localStorage.getItem('local_matches')) || [];
                const idx = localData.findIndex(m => m.id === currentEditId);
                if (idx !== -1) {
                    localData[idx] = { ...updated, id: currentEditId };
                    localStorage.setItem('local_matches', JSON.stringify(localData));
                    renderMatches(localData);
                    closeModal();
                }
            }
        };

        function closeModal() { editModal.style.display = 'none'; }
    </script>
</body>
</html>
