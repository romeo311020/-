<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROMEO LIVE TV</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{color:white;text-align:center;min-height:100vh;overflow:hidden;position:relative;background:#001133;}
canvas#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
header{padding:20px;font-size:28px;font-weight:bold;background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);text-shadow:0 0 10px #00aaff,0 0 20px #0066ff;}
.container{width:90%;max-width:900px;margin:auto;margin-top:40px;}
.player{background:rgba(0,0,0,0.6);padding:10px;border-radius:12px;box-shadow:0 0 25px rgba(0,0,0,0.8);position:relative;padding-bottom:56.25%;height:0;overflow:hidden;}
.player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;border-radius:10px;}
.title{font-size:22px;margin-top:20px;text-shadow:0 0 10px #000;}
.buttons{margin-top:20px;display:flex;justify-content:center;flex-wrap:wrap;}
button{background:linear-gradient(45deg,#0066ff,#00aaff);border:none;padding:12px 25px;margin:8px;color:white;border-radius:10px;font-size:16px;cursor:pointer;transition:0.3s;box-shadow:0 0 10px #0077ff;}
button:hover{transform:scale(1.05);box-shadow:0 0 20px #00aaff;}
</style>
</head>

<body>
<canvas id="bgCanvas"></canvas>

<header>ROMEO LIVE TV</header>

<div class="container">
<div class="player">
<iframe 
id="videoPlayer"
src="https://www.youtube.com/embed/HoibpVTKjs4" 
allowfullscreen>
</iframe>
</div>

<div class="title">🎬 مشاهدة الفيديو</div>

<div class="buttons">
<button onclick="fullscreenVideo()">🖥 ملء الشاشة</button>
<button onclick="goBack()">⬅ الرجوع للموقع</button>
</div>
</div>

<script>
// وظائف الأزرار
function fullscreenVideo(){
var iframe = document.getElementById("videoPlayer");
if (iframe.requestFullscreen) {iframe.requestFullscreen();}
else if (iframe.webkitRequestFullscreen) {iframe.webkitRequestFullscreen();}
else if (iframe.msRequestFullscreen) {iframe.msRequestFullscreen();}
}

function goBack(){
window.location.href="https://romeo311020.github.io/romeo-live-tv-31/";
}

// خلفية النقاط الصاعدة
const canvas = document.getElementById("bgCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
let particleCount = 120;

for(let i=0;i<particleCount;i++){
    particles.push({
        x: Math.random()*canvas.width,
        y: canvas.height + Math.random()*canvas.height,
        radius: Math.random()*2 + 1,
        speed: Math.random()*1.5 + 0.5,
        glow: Math.random()*0.7 + 0.3
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=0;i<particles.length;i++){
        let p = particles[i];
        p.y -= p.speed;
        if(p.y < -10) p.y = canvas.height + 10;
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        let gradient = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.radius*6);
        gradient.addColorStop(0,'rgba(0, 170, 255,'+p.glow+')');
        gradient.addColorStop(1,'rgba(255,255,255,0)');
        ctx.fillStyle = gradient;
        ctx.fill();
    }
    requestAnimationFrame(animate);
}
animate();
window.addEventListener("resize",()=>{
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
});
</script>

</body>
</html>
